name: Build

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly security rebuild (Mondays 04:00 UTC): base images ship security
    # fixes under the SAME tag — they only reach us on a fresh build. The
    # run produces new run-N.ATTEMPT.0 tags, so Flux Image Automation rolls it out.
    - cron: '0 4 * * 1'

jobs:
  # The build itself lives in the build-image.yml reusable workflow so the
  # images are signed with a builder identity separate from this trigger
  # workflow (SLSA Build L3).
  build:
    if: >-
      github.event.pull_request.merged == true ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-image.yml
