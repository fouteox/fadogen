name: Build

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.SYSTEM_ARCH == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (no-dev — matches production)
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--no-dev'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      # Assets are built on the runner (not in the Dockerfile): the env is
      # decoded, a throwaway APP_KEY is generated, assets + SSR bundle are built,
      # then the env is deleted. No runtime secret ever reaches the image.
      - name: Load env and pre-build assets
        run: |
          echo "${{ secrets.ENV_FILE_BASE64 }}" | base64 -d > .env
          php artisan key:generate --force --ansi
          bun install --frozen-lockfile
          bun run build:ssr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for App image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,suffix=-app
            type=ref,event=branch,suffix=-app
            type=raw,value=run-${{ github.run_number }}-app
            latest

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: app
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Extract metadata for SSR image
        id: meta-ssr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,suffix=-ssr
            type=ref,event=branch,suffix=-ssr
            type=raw,value=run-${{ github.run_number }}-ssr
            ssr

      - name: Build and push SSR image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: ssr
          tags: ${{ steps.meta-ssr.outputs.tags }}
          labels: ${{ steps.meta-ssr.outputs.labels }}
          cache-from: type=gha,scope=ssr
          cache-to: type=gha,mode=max,scope=ssr

      - name: Cleanup pre-build env
        if: always()
        run: rm -f .env
