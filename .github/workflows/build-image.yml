name: Build Image

# Reusable build workflow (SLSA Build L3): running the build here gives the
# keyless certificates a builder identity of their own (job_workflow_ref
# points at this file instead of the trigger workflow). The cluster's
# ClusterImagePolicy and the in-workflow verifications below pin this file.
on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ vars.SYSTEM_ARCH == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies (no-dev — matches production)
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          composer-options: '--no-dev'

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: '24'
          cache: true
          run-install: false

      # Assets are built from the versioned example environment. The only key
      # needed by Laravel is generated for this job and discarded afterwards;
      # CI never receives the production environment.
      - name: Prepare isolated env and pre-build assets
        env:
          APP_ENV: production
          APP_DEBUG: 'false'
        run: |
          umask 077
          cp .env.example .env
          php artisan key:generate --force --ansi
          vp install --frozen-lockfile
          vp run build:ssr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Extract metadata for App image
        id: meta-app
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,suffix=-app
            type=ref,event=branch,suffix=-app
            type=raw,value=run-${{ github.run_number }}.${{ github.run_attempt }}.0-app
            latest

      - name: Build and push App image
        id: build-app
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: app
          labels: ${{ steps.meta-app.outputs.labels }}
          # Push the attested image by digest only. Deployable tags are created
          # only after the keyless signature has been verified below.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max,version=v1
          sbom: true
          # Scheduled runs bypass the layer cache and re-pull bases: a cached
          # rebuild would reuse the old (potentially vulnerable) layers and
          # defeat the purpose. cache-to still refreshes the cache for the
          # week's push builds.
          no-cache: ${{ github.event_name == 'schedule' }}
          pull: ${{ github.event_name == 'schedule' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-app
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-app,mode=max

      - name: Extract metadata for SSR image
        id: meta-ssr
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,suffix=-ssr
            type=ref,event=branch,suffix=-ssr
            type=raw,value=run-${{ github.run_number }}.${{ github.run_attempt }}.0-ssr
            ssr

      - name: Build and push SSR image
        id: build-ssr
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ssr
          labels: ${{ steps.meta-ssr.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max,version=v1
          sbom: true
          no-cache: ${{ github.event_name == 'schedule' }}
          pull: ${{ github.event_name == 'schedule' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-ssr
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-ssr,mode=max

      # GitHub's hosted attestation service generates Build Level 3 provenance
      # (build in a reusable workflow) independently of the BuildKit provenance
      # retained below for the current cluster policy. Both bundles are
      # attached through OCI 1.1 referrers.
      - name: Attest App image with GitHub
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-app.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest SSR image with GitHub
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-ssr.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Verify GitHub artifact attestations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          APP_DIGEST: ${{ steps.build-app.outputs.digest }}
          SSR_DIGEST: ${{ steps.build-ssr.outputs.digest }}
        run: |
          set -euo pipefail
          signer_workflow="$GITHUB_REPOSITORY/.github/workflows/build-image.yml"

          gh attestation verify "oci://$IMAGE@$APP_DIGEST" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$signer_workflow" \
            --deny-self-hosted-runners \
            --bundle-from-oci
          gh attestation verify "oci://$IMAGE@$SSR_DIGEST" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$signer_workflow" \
            --deny-self-hosted-runners \
            --bundle-from-oci

      # Cosign 3 signs both the image and its BuildKit SLSA v1 provenance as
      # OCI 1.1 artifacts. The latter is the format policy-controller can
      # enforce without falling back to legacy signature storage. The
      # certificate identity is job.workflow_ref: for a job defined in a
      # reusable workflow it references this file, exactly like the Fulcio SAN.
      - name: Sign, attest, verify and publish image tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          APP_DIGEST: ${{ steps.build-app.outputs.digest }}
          SSR_DIGEST: ${{ steps.build-ssr.outputs.digest }}
          APP_TAGS: ${{ steps.meta-app.outputs.tags }}
          SSR_TAGS: ${{ steps.meta-ssr.outputs.tags }}
          CERTIFICATE_IDENTITY: https://github.com/${{ job.workflow_ref }}
          EXPECTED_BUILDER_ID: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          set -euo pipefail

          secure_image() {
            local digest="$1"
            local image_ref="$IMAGE@$digest"
            local provenance_path="$RUNNER_TEMP/provenance-${digest#sha256:}.json"

            docker buildx imagetools inspect "$image_ref" \
              --format '{{ json .Provenance.SLSA }}' > "$provenance_path"
            actual_builder_id="$(docker buildx imagetools inspect "$image_ref" \
              --format '{{ .Provenance.SLSA.runDetails.builder.id }}')"
            build_type="$(docker buildx imagetools inspect "$image_ref" \
              --format '{{ .Provenance.SLSA.buildDefinition.buildType }}')"
            finished_on="$(docker buildx imagetools inspect "$image_ref" \
              --format '{{ .Provenance.SLSA.runDetails.metadata.finishedOn }}')"

            [[ "$actual_builder_id" == "$EXPECTED_BUILDER_ID" ]]
            [[ "$build_type" == "https://github.com/moby/buildkit/blob/master/docs/attestations/slsa-definitions.md" ]]
            [[ -n "$finished_on" && "$finished_on" != "<nil>" && "$finished_on" != "<no value>" ]]

            cosign sign --yes "$image_ref"
            cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$image_ref" >/dev/null

            cosign attest --yes \
              --predicate "$provenance_path" \
              --type slsaprovenance1 \
              "$image_ref"
            cosign verify-attestation \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --type slsaprovenance1 \
              "$image_ref" >/dev/null
          }

          publish_tags() {
            local image_ref="$IMAGE@$1"
            local tags_text="$2"
            local -a tag_args=()

            while IFS= read -r tag; do
              [[ -n "$tag" ]] && tag_args+=(--tag "$tag")
            done <<< "$tags_text"

            ((${#tag_args[@]} > 0))
            docker buildx imagetools create "${tag_args[@]}" "$image_ref"
          }

          secure_image "$APP_DIGEST"
          secure_image "$SSR_DIGEST"
          publish_tags "$APP_DIGEST" "$APP_TAGS"
          publish_tags "$SSR_DIGEST" "$SSR_TAGS"

      # Le Receiver vérifie le JWT OIDC (dépôt + workflow) et réveille les deux
      # ImageRepository seulement une fois les images app ET SSR publiées.
      - name: Notify Flux image automation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FLUX_WEBHOOK_URL: https://flux-webhook.florianoster.com/hook/5f6e6bd142588e6456ed18c2c14b63fc303cb2d7226e4bbda4e901591d1a173b
        with:
          script: |
            const token = await core.getIDToken('notification-controller')
            const response = await fetch(process.env.FLUX_WEBHOOK_URL, {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
            })

            if (!response.ok) {
              throw new Error(`Flux webhook returned HTTP ${response.status}: ${await response.text()}`)
            }

      - name: Cleanup isolated build env
        if: always()
        run: rm -f .env
