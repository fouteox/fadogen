# Dependabot: version updates for the CI supply chain only (Dockerfile FROMs
# and GitHub Actions). Composer/npm version noise is deliberately excluded —
# security-driven PRs for those come from Dependabot security updates,
# enabled at the repository level.
#
# Note: both FROMs are digest-pinned — Dependabot keeps tag and digest in
# sync, so every upstream rebuild of the base lands as a reviewable PR.
# PHP version bumps stay deliberate (Dockerfile + setup-php + composer.json
# move together). The weekly scheduled rebuild in build.yml still refreshes
# what RUN layers fetch at build time (install-php-extensions, composer).
version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
  # Dependabot security updates do NOT support bun yet (alerts fire from
  # bun.lock, but no auto-fix PR — GitHub changelog, planned). Compensation:
  # one grouped monthly version-update PR keeps the JS lockfile fresh.
  # Composer needs no equivalent: its security updates are fully supported.
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: monthly
    groups:
      js-dependencies:
        patterns: ["*"]
